<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Leaflet Image Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
            background: #f4f0e0;
        }
    </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    var imgWidth = 5000;
    var imgHeight = 6954;
    var bounds = [[0, 0], [imgHeight, imgWidth]];

    var map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -3,
        maxZoom: 3,
        maxBounds: bounds,
        maxBoundsViscosity: 1.0,
        zoomSnap: 0.1,
        zoomDelta: 0.1,
        zoomControl: true
    });

    L.imageOverlay('http://localhost:8000/input.jpg', bounds).addTo(map);

    // 🎯 COVER MODE: Calculate zoom to FILL the container (crop edges if needed)
    function getCoverZoom() {
        var mapSize = map.getSize();

        // Calculate scale factors
        var scaleX = mapSize.x / imgWidth;
        var scaleY = mapSize.y / imgHeight;

        // Use the LARGER scale to ensure image fills container (crop the rest)
        var coverScale = Math.max(scaleX, scaleY);

        return Math.log(coverScale) / Math.log(2);
    }

    // Apply cover zoom as minimum
    var coverZoom = getCoverZoom();
    map.setMinZoom(coverZoom);
    map.setMaxZoom(3);

    // Center the map and set zoom
    map.fitBounds(bounds, { padding: [0, 0], animate: false });
    map.setZoom(coverZoom);

    // Center on the image center
    map.setView([imgHeight/2, imgWidth/2], coverZoom);

    // Update on resize
    map.on('resize', function() {
        var newCoverZoom = getCoverZoom();
        map.setMinZoom(newCoverZoom);
        map.setZoom(Math.max(map.getZoom(), newCoverZoom));
    });
</script>
</body>
</html>
